<title>Код идентичности. Версия 2.0</title>

<body>
<div id="root"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>

<script type="text/babel" data-presets="react">
const { useState, useEffect, useCallback } = React;

const VALUES = [
  { id: "v1", name: "Активность", desc: "Ты по природе в движении, действие для тебя естественнее покоя.", check: "в свободный час ты скорее куда-то идёшь или что-то делаешь, чем лежишь. От безделья ты не отдыхаешь, а маешься." },
  { id: "v2", name: "Амбициозность", desc: "Тебе мало среднего, ты тянешься выше там, где другие останавливаются.", check: "получив результат, ты почти сразу думаешь о следующей планке, а не довольствуешься достигнутым." },
  { id: "v3", name: "Баланс", desc: "Ты распределяешь силы между делом, отдыхом, близкими и собой.", check: "ты отказываешься от лишней работы ради своего и не чувствуешь за это вины. Если вина есть, баланс пока желание." },
  { id: "v4", name: "Бережливость", desc: "Ты бережёшь ресурсы (деньги, вещи, силы) на автомате, без насилия над собой.", check: "ты чинишь, а не выбрасываешь, сравниваешь цены без раздражения. Если экономишь из страха «нет денег», это не бережливость, это дефицит." },
  { id: "v5", name: "Бесстрашие", desc: "Ты входишь в страшное, потому что так надо, а не ждёшь пока страх уйдёт.", check: "за последний месяц ты сделала что-то пугающее именно потому что боялась этого избегать." },
  { id: "v6", name: "Благодарность", desc: "Ты замечаешь то, что есть, а не только то, чего не хватает.", check: "в обычный, не идеальный день ты находишь за что сказать спасибо. Не в кризис, а в рутине." },
  { id: "v7", name: "Благонадёжность", desc: "На тебя можно опереться в серьёзных вопросах, не только на словах.", check: "тебе доверяют важное без перепроверки. Если просят отчитаться на каждом шаге, доверия пока нет." },
  { id: "v8", name: "Благоразумие", desc: "Ты взвешиваешь последствия раньше, чем действуешь.", check: "импульсивные траты и поступки у тебя редкость, а не норма." },
  { id: "v9", name: "Благотворительность", desc: "Ты отдаёшь регулярно, не ожидая возврата.", check: "помощь другим встроена в твою жизнь, а не случается раз в год под настроение." },
  { id: "v10", name: "Богатство", desc: "Ты живёшь так, что ресурсов хватает и остаётся.", check: "у тебя есть запас, а не жизнь от долга к долгу. Если хочется богатства, но реальность это нехватка, твоя ценность сейчас не богатство." },
  { id: "v11", name: "Бодрость духа", desc: "Твоё базовое состояние, это энергия, а не вялость.", check: "ты чаще просыпаешься с желанием действовать, чем заставляешь себя встать." },
  { id: "v12", name: "Быть лучшим", desc: "Тебя двигает сравнение с другими.", check: "чужой лучший результат не гасит тебя, а заводит работать больше." },
  { id: "v13", name: "Вдохновение", desc: "Творческий подъём приходит к тебе сам, без внешнего толчка.", check: "ты начинаешь писать, придумывать, создавать просто потому что накрыло." },
  { id: "v14", name: "Вера", desc: "Ты опираешься на духовное не в кризис, а постоянно.", check: "твоя практика (молитва, медитация) есть в спокойные дни, а не только когда плохо." },
  { id: "v15", name: "Весёлость", desc: "Ты умеешь радоваться без повода и делаешь легче другим.", check: "люди говорят, что рядом с тобой отпускает." },
  { id: "v16", name: "Вклад", desc: "Ты системно делаешь то, что останется после тебя.", check: "ты вкладываешь время или деньги в то, что переживёт тебя саму. В дело, в детей, в идею, в людей, а не только в сегодняшний день." },
  { id: "v17", name: "Видение", desc: "Ты держишь в голове картину на годы вперёд.", check: "твои сегодняшние действия согласованы с тем, где ты хочешь быть через несколько лет. Если видения нет, но хочется, это желание." },
  { id: "v18", name: "Влияние", desc: "Ты меняешь решения и взгляды людей.", check: "к тебе приходят за мнением и поступают по нему. Не «хочу влиять», а «влияю»." },
  { id: "v19", name: "Внимательность", desc: "Ты ловишь детали, которые другие упускают.", check: "ты помнишь сказанное собеседником давно и опираешься на это." },
  { id: "v20", name: "Воображение", desc: "Ты постоянно достраиваешь образы, сценарии, идеи.", check: "тебе не скучно наедине с собой, голова сама рождает картины." },
  { id: "v21", name: "Воодушевление", desc: "Ты загораешься идеей и заражаешь других.", check: "люди соглашаются на твоё, потому что ты говоришь с огнём." },
  { id: "v22", name: "Восхищение", desc: "Ты искренне замечаешь и называешь чужую красоту и таланты.", check: "ты говоришь комплименты без выгоды для себя." },
  { id: "v23", name: "Выносливость", desc: "Ты держишь долгую нагрузку, не срываясь.", check: "когда дел навалилось и нагрузка долгая, ты доходишь до конца, а не бросаешь на середине." },
  { id: "v24", name: "Выполнение задач", desc: "Ты доводишь начатое до конца, в срок.", check: "твой список дел не зарастает просроченным. Если зарастает, это желание, а не ценность." },
  { id: "v25", name: "Гармония", desc: "У тебя редко спорят внутри «хочу» и «надо».", check: "ты не мучаешься выбором, потому что хочу и надо чаще совпадают." },
  { id: "v26", name: "Героизм", desc: "Ты готова рискнуть собой ради другого, и уже так делала.", check: "у тебя есть реальный случай, не фантазия про «я бы»." },
  { id: "v27", name: "Гибкость", desc: "Ты меняешь план, когда меняются обстоятельства, без драмы.", check: "ты отменяешь своё ради лучшей возможности и не зависаешь в сожалении." },
  { id: "v28", name: "Гостеприимство", desc: "Ты сама зовёшь людей, и им у тебя хорошо.", check: "ты инициируешь, а не только откликаешься на чужое приглашение." },
  { id: "v29", name: "Готовность помочь", desc: "Ты предлагаешь помощь раньше, чем тебя попросят.", check: "видя, что человек не справляется, ты подходишь сама." },
  { id: "v30", name: "Дальновидность", desc: "Ты видишь риски и возможности на годы и готовишься.", check: "ты откладываешь, страхуешься, готовишь почву заранее. Если только собираешься, это желание." },
  { id: "v31", name: "Дерзость", desc: "Ты нарушаешь рамки ради цели, когда это работает.", check: "у тебя есть случай, когда ты пошла напролом мимо правил и выиграла." },
  { id: "v32", name: "Динамизм", desc: "Ты любишь перемены, новые проекты, перемещения.", check: "ты меняешь среду чаще, чем большинство, и тебе это в кайф." },
  { id: "v33", name: "Дисциплина", desc: "Ты делаешь нужное, даже когда не хочется.", check: "у тебя есть регулярная практика, которую ты держишь и в нежелании. Если держишь через раз, дисциплина пока в становлении." },
  { id: "v34", name: "Доброта", desc: "Ты мягка, и твои действия причиняют минимум боли.", check: "ты не можешь пройти мимо чужой беды равнодушно, это сильнее тебя." },
  { id: "v35", name: "Доверие", desc: "Ты веришь людям на слово, не проверяя заранее.", check: "ты не выстраиваешь оборону до того, как человек дал повод." },
  { id: "v36", name: "Долг", desc: "Ты делаешь то, что должна, даже если никто не узнает.", check: "ты выполняешь обязательство, даже когда никто не видит и не проверит." },
  { id: "v37", name: "Долголетие", desc: "Ты вкладываешься в долгую жизнь действиями, не разговорами.", check: "ты ходишь к врачу для профилактики, а не когда уже прижало." },
  { id: "v38", name: "Достаток", desc: "Тебе хватает на нужное и немного на радость.", check: "ты не считаешь копейки до зарплаты. Если считаешь, достаток это желание." },
  { id: "v39", name: "Достижения", desc: "Ты ставишь измеримые вершины и берёшь их.", check: "за тобой реальные взятые результаты, а не только планы." },
  { id: "v40", name: "Достоинство", desc: "Ты не позволяешь обращаться с собой как попало.", check: "ты спокойно выходишь из разговора, где на тебя давят или унижают." },
  { id: "v41", name: "Драйв", desc: "Тебе нужны острые ощущения, ты ищешь их.", check: "ты сама создаёшь ситуации с адреналином, а не избегаешь их." },
  { id: "v42", name: "Дружелюбие", desc: "Ты открыта к новым людям и излучаешь тепло.", check: "незнакомцы заговаривают с тобой первыми." },
  { id: "v43", name: "Дух товарищества", desc: "Свои для тебя реально свои, ты за них впрягаешься.", check: "ты остаёшься помочь команде, когда своё уже сделала." },
  { id: "v44", name: "Духовность", desc: "Ты ищешь смысл за пределами материи, и это живёт в тебе уже сейчас.", check: "у тебя есть живая практика, а не только интерес и разговоры о духовном." },
  { id: "v45", name: "Желание", desc: "Ты делаешь то, что хочешь, не оглядываясь на «надо».", check: "ты можешь сорваться за своим зовом, а не задушить его ради приличий." },
  { id: "v46", name: "Жизнерадостность", desc: "Твоё обычное настроение позитивное, ты редко унываешь надолго.", check: "тебя спрашивают, откуда у тебя столько света." },
  { id: "v47", name: "Забота", desc: "Ты заботишься о близких сама, без напоминаний.", check: "ты сама замечаешь, поел ли близкий, как он себя чувствует, и делаешь для других, не дожидаясь просьбы." },
  { id: "v48", name: "Здоровье", desc: "Ты выбираешь в пользу тела и психики, даже когда вредное приятнее.", check: "ты ложишься вовремя или отказываешься от вредного не на словах. Если говоришь «здоровье важно», но действуешь против, это образ себя, а не ценность." },
  { id: "v49", name: "Знания", desc: "Ты тратишь время на новое и тебе это в радость.", check: "встретив непонятное, ты сама идёшь разбираться, а не оставляешь как есть." },
  { id: "v50", name: "Значимость", desc: "Тебе важно быть важной для других.", check: "тебя задевает, когда твоё мнение не спросили или прошли мимо." },
  { id: "v51", name: "Известность", desc: "Тебя знают за пределами твоего круга.", check: "тебя узнают на улице незнакомые люди. Если этого хочется, но пока не происходит, это желание, а не ценность." },
  { id: "v52", name: "Изобилие", desc: "Ты живёшь из ощущения, что всего достаточно, а не из дефицита.", check: "ты легко тратишь и отпускаешь, без внутренней судороги «а вдруг не хватит»." },
  { id: "v53", name: "Изобретательность", desc: "Ты находишь решение из подручного там, где другие в тупике.", check: "ты на ходу придумываешь, как выкрутиться, и тебе это легко." },
  { id: "v54", name: "Интеллект", desc: "Ты ценишь ум, тянешься к сложным задачам.", check: "ты берёшься за умственный вызов ради удовольствия, а не по необходимости." },
  { id: "v55", name: "Интуиция", desc: "Ты доверяешь внутреннему сигналу, и он часто прав.", check: "ты не раз шла за чутьём против логики и оказывалась права." },
  { id: "v56", name: "Искренность", desc: "Ты настоящая в общении, не играешь роль и не притворяешься.", check: "в важном ты говоришь честно и не прячешься за маской. В мелочах можешь сгладить или промолчать, но фальши в тебе нет." },
  { id: "v57", name: "Командная работа", desc: "Ты лучше в группе, чем одна, и тянешься к этому.", check: "ты сама берёшь на себя общее дело, а не избегаешь его." },
  { id: "v58", name: "Комфорт", desc: "Ты создаёшь себе удобство, тело и быт для тебя важны.", check: "ты доплачиваешь за удобное и не терпишь дискомфорт молча. Если терпишь дискомфорт ради цели, комфорт это желание, а не ценность." },
  { id: "v59", name: "Контроль", desc: "Ты держишь процессы и людей в руках, тебе тяжело отпустить.", check: "ты перепроверяешь даже тех, кому доверяешь, и не можешь отпустить мысли о деле. Часто люди не называют это ценностью, но живут из неё." },
  { id: "v60", name: "Красота", desc: "Ты замечаешь прекрасное и создаёшь эстетику вокруг.", check: "ты тратишь силы на то, чтобы было красиво, даже когда никто не оценит." },
  { id: "v61", name: "Креатив", desc: "Ты рождаешь новые идеи, по шаблону тебе скучно.", check: "ты ищешь свой способ там, где есть готовый." },
  { id: "v62", name: "Лидерство", desc: "Ты берёшь направление, и за тобой идут.", check: "люди идут за тобой без принуждения. Если хочется вести, но не идут, это желание." },
  { id: "v63", name: "Логика", desc: "Ты опираешься на факты и связь причин, а не на эмоцию.", check: "в споре ты требуешь оснований, а не повышаешь голос." },
  { id: "v64", name: "Любовь", desc: "Ты действуешь из тепла и глубокого принятия, готова поступиться собой ради другого.", check: "ты прощаешь близкому то, что не простила бы чужому." },
  { id: "v65", name: "Любопытство", desc: "Тебе интересно как устроен человек, мир, ситуация.", check: "ты лезешь разбираться в незнакомом сразу, не откладывая." },
  { id: "v66", name: "Мастерство", desc: "Ты доводишь свой навык до уровня, тебе мало «нормально».", check: "ты тренируешься даже когда уже умеешь средне." },
  { id: "v67", name: "Мечтательность", desc: "Ты уходишь в образы будущего, и это тебя питает.", check: "тебе приятнее придумывать миры, чем расписывать завтрашний день." },
  { id: "v68", name: "Милосердие", desc: "Твоя жалость переходит в действие, даже к тем, кто «сам виноват».", check: "ты помогаешь, не выставляя счёт за чужие ошибки." },
  { id: "v69", name: "Мир", desc: "Ты выбираешь согласие там, где можно не воевать.", check: "ты гасишь ссору, а не раздуваешь, и тебе это органично." },
  { id: "v70", name: "Многосторонность", desc: "Ты не один тип, у тебя много граней и ты их не прячешь.", check: "у тебя одновременно живут разные интересы, и тебе тесно в одной роли." },
  { id: "v71", name: "Молодость", desc: "Ты держишь лёгкость и незаскорузлость независимо от возраста.", check: "ты берёшься за новое и не чувствуешь себя «старой» для этого." },
  { id: "v72", name: "Мотивация", desc: "Ты находишь «зачем», когда не хочется.", check: "в нежелании ты включаешь смысл и всё равно делаешь." },
  { id: "v73", name: "Мудрость", desc: "Ты видишь шире момента, не спешишь с выводами.", check: "к тебе идут за советом, потому что ты не осуждаешь и видишь объёмно." },
  { id: "v74", name: "Мужество", desc: "Ты идёшь на страх ради принципов или других.", check: "ты высказываешь непопулярное, когда это важно, а не отмалчиваешься." },
  { id: "v75", name: "Мягкость", desc: "Ты без давления и жёсткости, твоя просьба звучит как предложение.", check: "ты добиваешься своего теплом, а не нажимом." },
  { id: "v76", name: "Надежда", desc: "Даже в плохом ты видишь куда двигаться.", check: "при провале ты ищешь варианты, а не падаешь в отчаяние." },
  { id: "v77", name: "Надёжность", desc: "Ты делаешь обещанное, в срок.", check: "люди не переспрашивают, точно ли ты сделаешь. Они спокойны, потому что знают: раз сказала, значит будет." },
  { id: "v78", name: "Наслаждение", desc: "Ты умеешь получать удовольствие здесь и сейчас, всем телом.", check: "ты выбираешь вкус, прикосновение, удовольствие ради них самих." },
  { id: "v79", name: "Настойчивость", desc: "Ты не бросаешь при первом сопротивлении.", check: "ты возвращаешься к преграде снова, пока не пройдёшь." },
  { id: "v80", name: "Находчивость", desc: "Ты быстро выходишь из неожиданной ситуации.", check: "ты соображаешь на ходу, когда всё пошло не по плану." },
  { id: "v81", name: "Невозмутимость", desc: "Тебя сложно вывести, ты спокойна в кризисе.", check: "когда вокруг паника, ты собранна и действуешь." },
  { id: "v82", name: "Независимость", desc: "Ты не полагаешься на других в финансах и решениях.", check: "ты живёшь отдельно и оплачиваешь свои счета сама." },
  { id: "v83", name: "Необычность", desc: "Ты не похожа на других и не прячешь это, твоя инаковость тебя питает.", check: "ты идёшь против общей нормы по своей воле, и тебе в этом хорошо, а не тревожно." },
  { id: "v84", name: "Неустрашимость", desc: "Почти не испытываешь страха в опасных ситуациях.", check: "ты идёшь в тёмный переулок одна, не ускоряя шаг." },
  { id: "v85", name: "Обаяние", desc: "Люди тянутся к тебе без твоего усилия.", check: "людям легко полюбить тебя, это происходит само, без твоих усилий." },
  { id: "v86", name: "Образование", desc: "Ты ценишь формальное обучение и вкладываешься в него.", check: "ты учишься, добираешь дипломы и сертификаты, а не только считаешь это важным." },
  { id: "v87", name: "Обучение", desc: "Ты учишься всю жизнь, ради понимания, а не корочки.", check: "ты осваиваешь новое, даже когда не станешь в этом профи." },
  { id: "v88", name: "Определённость", desc: "Тебе нужны точные сроки и правила, неожиданности напрягают.", check: "ты строишь детальные планы и нервничаешь, когда сбивается график. Если, наоборот, ты сама не даёшь определённость и не ставишь дедлайны, это не твоя ценность." },
  { id: "v89", name: "Оптимизм", desc: "Твоя первая реакция на трудность, это поиск выхода, а не катастрофа.", check: "после удара ты говоришь «найду лучше», и веришь в это." },
  { id: "v90", name: "Опыт", desc: "Ты опираешься на прожитое, не наступаешь на те же грабли.", check: "ты учишься на своих и чужих ошибках, а не повторяешь их." },
  { id: "v91", name: "Организация", desc: "Ты создаёшь порядок из хаоса.", check: "ты сама наводишь систему в пространстве и делах, тебе так спокойнее." },
  { id: "v92", name: "Оригинальность", desc: "Твои идеи и вещи уникальны, ты не копируешь.", check: "тебе скучно «как все», ты ищешь свой путь." },
  { id: "v93", name: "Осмотрительность", desc: "Ты семь раз отмеряешь перед тем как резать.", check: "ты читаешь договор до мелкого шрифта, а не подписываешь на доверии." },
  { id: "v94", name: "Основательность", desc: "Ты делаешь фундаментально, чтобы не переделывать.", check: "ты вкладываешься в надёжность сразу, а не латаешь потом." },
  { id: "v95", name: "Острота ума", desc: "Ты схватываешь суть быстро.", check: "тебе не нужно долго объяснять, ты ловишь на лету." },
  { id: "v96", name: "Отвага", desc: "Ты делаешь то, чего боятся многие.", check: "ты идёшь в неудобный разговор или шаг, хотя внутри трясёт." },
  { id: "v97", name: "Отдых", desc: "Ты регулярно выделяешь время на восстановление.", check: "у тебя есть реальное время без работы. Если ты всегда на связи и не планируешь отдых, это желание, а не ценность." },
  { id: "v98", name: "Откровенность", desc: "Ты делишься сокровенным, не боишься быть уязвимой.", check: "ты рассказываешь о своих страхах и сомнениях, не прячешь их." },
  { id: "v99", name: "Победа", desc: "Тебе нужно выигрывать, поражение ты переносишь тяжело.", check: "ты ищешь соревнование и расстраиваешься от любого места, кроме первого. Если ты не лезешь в соревнования, это не ценность." },
  { id: "v100", name: "Поддержка", desc: "Рядом с тобой человек чувствует, что не один.", check: "ты звонишь близкому в трудный день просто побыть рядом." },
  { id: "v101", name: "Покой", desc: "Тебе нужна тишина без суеты, и ты её создаёшь.", check: "ты уходишь в тишину по своей воле и тебе там хорошо, а не тревожно." },
  { id: "v102", name: "Полнота ума", desc: "Ты идёшь до сути, до деталей, тебе мало поверхности.", check: "ты читаешь первоисточник, а не краткий пересказ." },
  { id: "v103", name: "Понимание", desc: "Ты слышишь человека за словами, даже когда не согласна.", check: "ты слушаешь не перебивая, чтобы понять, а не чтобы ответить." },
  { id: "v104", name: "Поощрение", desc: "Ты любишь хвалить и давать обратную связь.", check: "ты первая замечаешь чужой успех и называешь его." },
  { id: "v105", name: "Популярность", desc: "Тебя знают и любят в широких кругах.", check: "у тебя растёт аудитория, тебя зовут, тебя видят. Если хочется, но пока нет, это желание." },
  { id: "v106", name: "Порядок", desc: "Тебе нужна структура и чистота в пространстве и времени.", check: "ты не успокоишься, пока вещи не на местах. Если у тебя часто бардак и это норма, порядок это желание, а не ценность." },
  { id: "v107", name: "Последовательность", desc: "Твои действия вытекают из твоих слов и принципов.", check: "ты делаешь то, что декларируешь, а не только говоришь. Если живёшь хаотично, это не твоя ценность сейчас." },
  { id: "v108", name: "Поток", desc: "Ты растворяешься в любимом деле, теряешь счёт времени, оно идёт само.", check: "ты забываешь поесть, когда увлечена." },
  { id: "v109", name: "Правда", desc: "Ты ищешь и говоришь правду, даже неприятную.", check: "ты называешь вещи как есть, когда могла бы смолчать ради выгоды." },
  { id: "v110", name: "Практичность", desc: "Ты выбираешь то, что работает, а не модное или красивое.", check: "ты берёшь удобное и функциональное, даже жертвуя видом." },
  { id: "v111", name: "Преданность", desc: "Ты остаёшься верна человеку, делу, компании даже в трудные времена.", check: "ты не уходишь, когда у близкого или дела кризис, хотя есть куда уйти. Ты вкладываешь силы, время и верность туда, где однажды сказала «да»." },
  { id: "v112", name: "Предвидение", desc: "Ты заглядываешь вперёд и готовишься заранее.", check: "ты берёшь зонт, когда тучи только собираются. Если только хотела бы так уметь, это желание." },
  { id: "v113", name: "Привлекательность", desc: "Ты несёшь себя так, что притягиваешь, и вкладываешься в это.", check: "твоя подача работает на тебя, и ты ею занимаешься осознанно." },
  { id: "v114", name: "Привязанность", desc: "Ты сильно привязываешься к людям и месту, тяжело расстаёшься.", check: "расставание и переезд даются тебе через боль, не легко." },
  { id: "v115", name: "Признание", desc: "Тебе важно, чтобы твой вклад замечали официально.", check: "тебя задевает, когда заслугу не отметили, и ты этого ждёшь." },
  { id: "v116", name: "Приключения", desc: "Тебе нужна новизна и риск, без них скучно.", check: "ты едешь в неизвестное ради остроты, а не избегаешь его." },
  { id: "v117", name: "Прозорливость", desc: "Ты видишь куда ведёт ситуация раньше, чем она случилась.", check: "ты не раз предсказала исход по первым признакам." },
  { id: "v118", name: "Продуктивность", desc: "Ты делаешь много за единицу времени.", check: "ты успеваешь больше других за то же время. Если для тебя это пустое слово и не про тебя, это желание." },
  { id: "v119", name: "Проницательность", desc: "Ты чувствуешь, что стоит за словами человека.", check: "ты считываешь ложь и истинный мотив с первого взгляда." },
  { id: "v120", name: "Простота", desc: "Ты убираешь лишнее, живёшь и говоришь по существу.", check: "тебе хорошо с минимумом, ты не усложняешь." },
  { id: "v121", name: "Профессионализм", desc: "Ты делаешь работу на уровне и растёшь в ней.", check: "ты не берёшь то, в чём не разбираешься, или добираешь знания под задачу." },
  { id: "v122", name: "Прямота", desc: "Ты говоришь в глаза, без намёков и обходов.", check: "ты называешь вещи прямо, а не намекаешь и ждёшь, что догадаются." },
  { id: "v123", name: "Пунктуальность", desc: "Тебе важно уважение к времени, и ты приходишь вовремя.", check: "ты приходишь без опозданий по своей внутренней норме. Если часто опаздываешь, это желание, а не ценность сейчас." },
  { id: "v124", name: "Радость", desc: "Ты часто ловишь лёгкое счастье без повода.", check: "чашка кофе, закат, смех ребёнка дают тебе прилив радости без праздника." },
  { id: "v125", name: "Развлечения", desc: "Тебе нужно часто развлекаться, ты планируешь досуг.", check: "ты заранее организуешь себе игры, кино, вечеринки." },
  { id: "v126", name: "Размышления", desc: "Ты любишь думать, анализировать, философствовать.", check: "ты можешь долго обдумывать идею ради самого процесса." },
  { id: "v127", name: "Рассудительность", desc: "Ты взвешиваешь за и против, не поддаёшься эмоции.", check: "перед важным ты изучаешь, сравниваешь, а не решаешь сгоряча." },
  { id: "v128", name: "Реализм", desc: "Ты смотришь на вещи трезво, без прикрас.", check: "ты называешь риски и говоришь «может не получиться», когда это правда." },
  { id: "v129", name: "Решительность", desc: "Ты быстро решаешь и не грызёшь себя потом.", check: "ты выбираешь и идёшь, а не зависаешь в сомнениях." },
  { id: "v130", name: "Романтика", desc: "В тебе есть место для красивого, нежного, особенного.", check: "ты создаёшь романтические жесты сама, а не только ждёшь их." },
  { id: "v131", name: "Рост", desc: "Ты развиваешься, становишься больше, чем была.", check: "каждый период ты осваиваешь то, чего раньше не было." },
  { id: "v132", name: "Руководство", desc: "Ты управляешь людьми, распределяешь задачи.", check: "тебя ставят старшей, и ты организуешь других естественно." },
  { id: "v133", name: "Самоконтроль", desc: "Ты не срываешься, держишь импульсы.", check: "ты хотела сорваться или сделать лишнее, но удержалась. Если часто не можешь сдержаться, это желание." },
  { id: "v134", name: "Самообладание", desc: "Ты сохраняешь спокойствие в стрессе и действуешь чётко.", check: "в острой ситуации ты собранна, а не в панике. Если хочешь так уметь, но пока не выходит, это желание." },
  { id: "v135", name: "Самоотверженность", desc: "Ты ставишь чужие интересы выше своих.", check: "ты жертвуешь своим ради других на деле. Если честно отвечаешь «нет», это не твоя ценность." },
  { id: "v136", name: "Свобода", desc: "Ты не зависишь от людей, веществ, обстоятельств, и сама выбираешь опоры.", check: "ты можешь сказать «нет» давлению, потому что так решила. Несвобода в клетке, даже золотой, для тебя невыносима." },
  { id: "v137", name: "Своевременность", desc: "Ты делаешь в оптимальный момент, не рано и не поздно.", check: "ты чувствуешь момент и попадаешь в него. Если в жизни этого нет, это желание." },
  { id: "v138", name: "Сдержанность", desc: "Ты выбираешь не выплёскивать всё наружу, держишь форму.", check: "ты осознанно не вываливаешь эмоции, когда это неуместно. Если ты не сдержанна, это не твоя ценность сейчас." },
  { id: "v139", name: "Сексуальность", desc: "Для тебя это жизненная энергия и телесность, ты живёшь в теле и проявляешь это для себя.", check: "ты чувствуешь тело, наслаждаешься тканью, танцем, объятием не для чужого взгляда, а для себя. Это твоя энергия и подача, а не поза." },
  { id: "v140", name: "Семья", desc: "Ты регулярно вкладываешься в родных и участвуешь в их жизни.", check: "ты включена в жизнь родных делами, а не только тоскуешь по теплу. Если ты не стремишься к этому в жизни, это желание, а не ценность." },
  { id: "v141", name: "Сердечность", desc: "Ты тёплая, с тобой легко о сокровенном.", check: "люди раскрываются и плачут рядом с тобой, чувствуя безопасность." },
  { id: "v142", name: "Сила духа", desc: "Ты не ломаешься под ударами судьбы.", check: "после потери или краха ты продолжаешь идти к своему." },
  { id: "v143", name: "Синергия", desc: "Ты объединяешься с другими, потому что вместе получается больше, чем поодиночке.", check: "ты объединяешь усилия ради того, что одной не под силу." },
  { id: "v144", name: "Скорость", desc: "Ты делаешь быстро, медлительность тебя раздражает.", check: "ты решаешь вопрос за минуты там, где другие тянут." },
  { id: "v145", name: "Скромность", desc: "Ты не хвастаешься, приуменьшаешь заслуги.", check: "на похвалу ты отмахиваешься «да ладно». Если ты явно не скромный человек, это не твоя ценность." },
  { id: "v146", name: "Слава", desc: "Ты хочешь узнаваемости широкой публикой и идёшь к ней.", check: "ты выходишь в публичность ради имени, тебе важно, чтобы о твоём имени или деятельности ходила слава." },
  { id: "v147", name: "Смелость", desc: "Ты делаешь страшное ради своих целей.", check: "ты просишь, заявляешь, идёшь, хотя внутри страх." },
  { id: "v148", name: "Совершенство", desc: "Ты доводишь до идеала, огрехи тебя не отпускают.", check: "ты переделываешь, пока не встанет идеально. Если это не про тебя, это желание." },
  { id: "v149", name: "Сознательность", desc: "Ты отвечаешь за свои поступки и видишь их последствия для других.", check: "ты делаешь выбор осознанно, понимая, на кого он влияет." },
  { id: "v150", name: "Сопереживание", desc: "Чужая боль касается тебя по-настоящему.", check: "ты плачешь, когда плачет близкий, чужое горе тебя задевает." },
  { id: "v151", name: "Сосредоточенность", desc: "Ты долго держишь внимание на одном, не отвлекаясь.", check: "ты работаешь подолгу, не хватаясь за телефон." },
  { id: "v152", name: "Сотрудничество", desc: "Ты предпочитаешь делать вместе и делить ответственность.", check: "ты зовёшь напарника, даже когда можешь одна." },
  { id: "v153", name: "Сплочённость", desc: "Ты создаёшь ощущение своих и работаешь на общий результат.", check: "ты уступаешь личную выгоду ради выигрыша команды." },
  { id: "v154", name: "Спокойствие", desc: "Твоя внутренняя точка опоры не зависит от внешнего шума.", check: "в пробке, очереди, ожидании внутри у тебя тишина, а не раздражение." },
  { id: "v155", name: "Способность", desc: "Ты знаешь, что умеешь, и опираешься на это.", check: "ты берёшься за дело, потому что уверена в навыке, а не потому что некому больше." },
  { id: "v156", name: "Справедливость", desc: "Ты не выносишь, когда можно по-честному, а делают иначе.", check: "ты заявляешь о несправедливости, а не терпишь молча." },
  { id: "v157", name: "Стабильность", desc: "Тебе важна предсказуемость, ты держишься за устойчивое и надёжное.", check: "ты остаёшься на одном месте годами и не меняешь его без веской причины. Перемены ты переносишь тяжелее, чем постоянство." },
  { id: "v158", name: "Стойкость", desc: "Ты выдерживаешь боль, давление, неудачи.", check: "ты держишься и продолжаешь жить под грузом, который других кладёт на лопатки." },
  { id: "v159", name: "Страсть", desc: "Ты горишь делом, готова жертвовать ради него.", check: "ты забываешь о сне и еде, когда увлечена своим." },
  { id: "v160", name: "Стремление", desc: "Тебя тянет вперёд, то что есть, тебя не насыщает.", check: "достигнув, ты уже хочешь следующего." },
  { id: "v161", name: "Строгость", desc: "Ты держишь высокий стандарт к себе и другим.", check: "ты требуешь планку и не спускаешь на тормозах. Если тебе это чуждо, это не твоя ценность." },
  { id: "v162", name: "Счастье", desc: "Ты часто ощущаешь удовлетворённость жизнью.", check: "ты ложишься с мыслью «сегодня был хороший день»." },
  { id: "v163", name: "Твёрдость", desc: "Ты не меняешь решение под давлением.", check: "ты сказала «нет» и не сдалась после уговоров." },
  { id: "v164", name: "Точность", desc: "Ты соблюдаешь меры, форматы, детали.", check: "ты выверяешь детали и меры точно, а не на глаз. Если на деле тебе всё равно, это желание." },
  { id: "v165", name: "Трудолюбие", desc: "Ты работаешь много, не жалея сил.", check: "ты берёшь больше и остаёшься дольше по своей воле. Если ты не такая трудолюбивая, это не твоя ценность." },
  { id: "v166", name: "Тщательность", desc: "Ты проверяешь каждую деталь, не оставляешь на потом.", check: "ты перечитываешь и доводишь до чистоты. Если это не про тебя, это желание." },
  { id: "v167", name: "Убедительность", desc: "Ты можешь переубедить и доказать своё.", check: "люди соглашаются с тобой после разговора." },
  { id: "v168", name: "Уважение", desc: "Ты видишь в людях достоинство, не только функцию.", check: "ты относишься к человеку по его ценности, а не по его пользе для тебя." },

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function makePairs(items, prevPairs = []) {
  const shuffled = shuffle(items);
  const pairs = [];
  const used = new Set();
  
  // Try to avoid repeating previous pairs
  const prevPairSet = new Set(prevPairs.map(([a, b]) => [a.id, b.id].sort().join("|")));
  
  const tryPair = (remaining) => {
    if (remaining.length === 0) return true;
    if (remaining.length === 1) {
      // odd one out — pair with a random already-paired item
      return true;
    }
    for (let i = 1; i < remaining.length; i++) {
      const key = [remaining[0].id, remaining[i].id].sort().join("|");
      if (!prevPairSet.has(key)) {
        pairs.push([remaining[0], remaining[i]]);
        const next = remaining.filter((_, idx) => idx !== 0 && idx !== i);
        if (tryPair(next)) return true;
        pairs.pop();
      }
    }
    // fallback: just pair sequentially if no non-repeat found
    pairs.push([remaining[0], remaining[1]]);
    const next = remaining.slice(2);
    return tryPair(next);
  };
  
  tryPair(shuffled);
  
  // handle odd item
  if (shuffled.length % 2 !== 0 && pairs.length * 2 < shuffled.length) {
    const paired = new Set(pairs.flatMap(([a, b]) => [a.id, b.id]));
    const leftover = shuffled.find(v => !paired.has(v.id));
    if (leftover) {
      const partner = shuffle(pairs.flatMap(([a, b]) => [a, b]))[0];
      pairs.push([leftover, partner]);
    }
  }
  
  return pairs;
}

  const [results, setResults] = useState(null);

  const [animate, setAnimate] = useState(false);
  const [history, setHistory] = useState([]);

  const startTest = () => {
    const all = [...VALUES];
    setActive(all);
    const p = makePairs(all, []);
    setPairs(p);
    setPairIndex(0);
    setStopAt(null);
    setStopPhase(null);
    setPrevPairs([]);
    setRound(1);
    setPhase("compare");
    setHistory([]);
  };

  const snapshot = () => ({
    active, pairs, pairIndex, stopAt, stopPhase, prevPairs, round, phase, results,
  });

  const goBack = () => {
    if (history.length === 0) return;
    const prev = history[history.length - 1];
    setHistory(h => h.slice(0, -1));
    setActive(prev.active);
    setPairs(prev.pairs);
    setPairIndex(prev.pairIndex);
    setStopAt(prev.stopAt);
    setStopPhase(prev.stopPhase);
    setPrevPairs(prev.prevPairs);
    setRound(prev.round);
    setPhase(prev.phase);
    setResults(prev.results);
    setAnimate(false);
  };

  const checkStop = useCallback((remaining) => {
    const nextStop = STOPS.find(s => remaining.length <= s && (stopAt === null || s < stopAt));
    if (nextStop && remaining.length <= nextStop) {
      setStopAt(nextStop);
      setStopPhase(String(nextStop));
      return true;
    }
    return false;
  }, [stopAt]);

  const advance = (remaining) => {
    if (checkStop(remaining)) return;
    if (remaining.length <= 5) {
      setResults(remaining);
      setPhase("result");
      return;
    }
    const newPairs = makePairs(remaining, prevPairs);
    setPrevPairs(prev => [...prev, ...pairs]);
    setPairs(newPairs);
    setPairIndex(0);
    setRound(r => r + 1);
  };

  const choose = (winner) => {
    setHistory(h => [...h, snapshot()]);
    setAnimate(true);

      setAnimate(false);
      const loser = pairs[pairIndex].find(v => v.id !== winner.id);
      const newActive = active.filter(v => v.id !== loser.id);
      setActive(newActive);

      const nextIndex = pairIndex + 1;
      if (nextIndex >= pairs.length) {
        advance(newActive);
      } else {

        setPairIndex(nextIndex);
      }
    }, 150);
  };

        <span style={styles.star}>✦</span>
        <div style={styles.label}>Ступень {stopPhase}</div>
        <h2 style={{ ...styles.title, marginBottom: "6px" }}>{stopLabel.title}</h2>
        <p style={{ ...styles.subtitle, marginBottom: "28px" }}>{stopLabel.sub}</p>

        {history.length > 0 && (
          <button
            style={{ ...styles.backBtn, marginBottom: "16px" }}
            onMouseOver={e => e.target.style.opacity = "1"}
            onMouseOut={e => e.target.style.opacity = "0.6"}
            onClick={goBack}
          >
            ‹ Назад
          </button>
        )}

        {shown.map((v, i) => (
          <div key={v.id} style={styles.resultItem}>
            <span style={styles.resultNum}>{i + 1}</span>
            <span style={styles.resultName}>{v.name}</span>
          </div>
        ))}

        {active.length > 5 && (
          <button
            style={{ ...styles.btn, marginTop: "24px" }}
            onMouseOver={e => e.target.style.background = "#c9a84c22"}
            onMouseOut={e => e.target.style.background = "transparent"}
            onClick={continueFromStop}
          >
            Продолжить
          </button>
        )}
        {active.length <= 5 && (
          <button
            style={{ ...styles.btn, marginTop: "24px" }}
            onMouseOver={e => e.target.style.background = "#c9a84c22"}
            onMouseOut={e => e.target.style.background = "transparent"}
            onClick={() => { setResults(active); setPhase("result"); }}
          >
            Завершить
          </button>
        )}
      </div>
    );
  }

  if (phase === "result") {
    return (
      <div style={styles.root}>
        <span style={styles.star}>✦</span>
        <div style={styles.label}>Топ 5</div>
        <h2 style={{ ...styles.title, marginBottom: "6px" }}>Таниса 2.0</h2>
        <p style={{ ...styles.subtitle, marginBottom: "28px" }}>твои опоры, версия «я желаемая»</p>

        {results && results.slice(0, 5).map((v, i) => (
          <div key={v.id} style={styles.resultItem}>
            <span style={styles.resultNum}>{i + 1}</span>
            <span style={styles.resultName}>{v.name}</span>
          </div>
        ))}

        <button
          style={{ ...styles.btn, marginTop: "32px" }}
          onMouseOver={e => e.target.style.background = "#c9a84c22"}
          onMouseOut={e => e.target.style.background = "transparent"}
          onClick={startTest}
        >
          Пройти заново
        </button>
      </div>
    );
  }

  if (!currentPair) return null;

  return (
    <div style={styles.root}>
      <div style={styles.progressBar}>
        <div style={{ ...styles.progressFill, width: `${progress}%` }} />
      </div>

      <div style={styles.counter}>
        осталось {active.length} из {VALUES.length}
      </div>

      {history.length > 0 && (
        <button
          style={styles.backBtn}
          onMouseOver={e => e.target.style.opacity = "1"}
          onMouseOut={e => e.target.style.opacity = "0.6"}
          onClick={goBack}
        >
          ‹ Назад
        </button>
      )}

      <div style={{ opacity: animate ? 0 : 1, transition: "opacity 0.15s", width: "100%", display: "flex", flexDirection: "column", alignItems: "center" }}>
        {currentPair.map((v, idx) => (
          <div key={v.id}>
            {idx === 1 && <div style={styles.vs}>или</div>}
            <div
              style={styles.card}
              onMouseOver={e => e.currentTarget.style.borderColor = "#c9a84c55"}
              onMouseOut={e => e.currentTarget.style.borderColor = "#2a2520"}
              onClick={() => choose(v)}
            >
              <div style={styles.cardName}>{v.name}</div>
              <div style={styles.cardDesc}>{v.desc}</div>
              <div style={styles.cardCheck}>Проверка: {v.check}</div>
            </div>
          </div>
        ))}

        <div style={styles.actionRow}>
          <button
            style={{ ...styles.smallBtn, ...styles.keepBtn }}
            onMouseOver={e => e.target.style.borderColor = "#c9a84c55"}
            onMouseOut={e => e.target.style.borderColor = "#3a3530"}
            onClick={keepBoth}
          >
            Оставить обе
          </button>
          <button
            style={{ ...styles.smallBtn, ...styles.removeBtn }}
            onMouseOver={e => e.target.style.borderColor = "#5a3030"}
            onMouseOut={e => e.target.style.borderColor = "#2a2020"}
            onClick={removeBoth}
          >
            Убрать обе
          </button>
        </div>
      </div>
    </div>
  );
}


const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<App />);
</script>
</body>
</html>
